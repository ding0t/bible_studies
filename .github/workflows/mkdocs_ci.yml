name: "[DEPRECATED] MkDocs CI Workflow - Use astro_deploy.yml instead

# This workflow has been deprecated in favor of the Astro static site generator.
# The new deployment workflow is in .github/workflows/astro_deploy.yml
# This file is kept for reference only and is no longer triggered.

on:
  # Disabled - use astro_deploy.yml instead
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
    
      - name: Add env var for cache
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
        
      - name: Setup cache
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      
      - name: Install python requirements
        run: pip install -r requirements.txt
    
      - name: Deploy pages
        run: mkdocs gh-deploy --force
