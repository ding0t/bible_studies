site_name: Biblical Studies by ding0t
site_url: 'https://ding0t.github.io/bible_studies/'
repo_url: 'https://github.com/ding0t/bible_studies'
docs_dir: docs/content

theme:
  name: material
  palette:
    # Defaults to the visitor's OS-level preference, then remembers their explicit choice.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - toc.follow
    - navigation.tracking
    - navigation.path
    - navigation.prune
    - navigation.top
    - navigation.indexes

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  # enable code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # allow inclusion of files outside docs
  - pymdownx.snippets
  - pymdownx.details
  # use pretty task lists
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # emojis - search here https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg