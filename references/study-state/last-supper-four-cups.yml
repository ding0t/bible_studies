  - {type: other, title: "Mishnah Pesachim 10 (via Sefaria, Wikisource, and secondary summaries)", author: "traditional/rabbinic", note: "Four-cups structure and the 'no drinking between 3rd and 4th cup' rule"}
  - {type: other, title: "Various (Chabad.org, TorahResource, Jewish Awareness Ministries)", author: "multiple", note: "Cross-checked the four-cups-to-Exodus-6:6-7 correspondence across independent Jewish and Messianic sources for convergence"}
  - {type: other, title: "Web search on Luke 22:19b-20 textual criticism (Western non-interpolation)", author: "multiple academic sources", note: "Confirmed Codex Bezae/Old Latin shorter reading vs majority longer reading"}
