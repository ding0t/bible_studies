slug: woman-issue-of-blood-faith-and-access
title: "The Woman with the Issue of Blood: Faith, Uncleanness, and Access to Jesus"
status: review
target_path: docs/content/studies/prophecy-fulfilled-in-jesus/woman-issue-of-blood-faith-and-access.md

primary_passage: "Mark 5:25-34"
supporting_passages: ["Matthew 9:20-22", "Luke 8:43-48", "Mark 5:21-24", "Mark 5:35-43", "Leviticus 15:19-30", "Leviticus 12:1-8"]
genre: [gospel]

stages:
  scoping:
    done: true
    notes: >
      Companion piece to the existing docs/content/studies/prophecy-fulfilled-in-jesus/woman-suffering-bleeding.md,
      which already covers the messianic-prophecy angle (Malachi 4:2 kanaf/fringe, Isaiah 53:5, Zechariah 8:23)
      thoroughly. This study takes a different, complementary angle: full exegesis of the narrative itself --
      historical/cultural background (Levitical uncleanness, social/economic cost), literary context (the Markan
      sandwich/intercalation with Jairus's daughter), word studies (haptomai/touch, dynamis/power, sozo/save-heal),
      and the theological principle of faith crossing purity/status boundaries -- rather than re-treading the
      prophecy-fulfillment ground already covered. Placed alongside the existing file per user request, category
      "theology" rather than "prophecy" since that's the more accurate fit for this angle.
  exegesis:
    historical_context:
      done: true
      notes: >
        Mark: traditionally Peter's interpreter (Papias, per Eusebius Hist. Eccl. 3.39), writing for a
        Gentile/Roman audience (explains he translates Aramaic terms, explains Jewish customs). Likely
        pre-70 or very early post-70. Levitical background: Lev 15:19-30 (chronic non-menstrual discharge,
        source-verified against macula-hebrew's own text of Lev 15:25,27 -- tame/H2930-31 "unclean",
        naga/H5060 "touch" -- touching a woman in this state, or what she has sat/lain on, transmits
        uncleanness to the toucher until evening plus washing). Also intersects Lev 12 (postpartum
        uncleanness) thematically via the "12 years" detail paralleling Jairus's 12-year-old daughter.
        Economic/social cost: "spent all she had on physicians, grew worse" (Mark 5:26) reflects real
        cost of chronic illness in an agrarian economy with no social safety net; chronic uncleanness
        would also have meant years of exclusion from temple worship and normal social/family touch.
    literary_context:
      done: true
      notes: >
        Sits inside Mark 5:21-43, a classic Markan intercalation ("sandwich"): Jairus pleads for his dying
        12-year-old daughter (21-24) -> interrupted by the woman's 12-year healing (25-34) -> resumed,
        daughter raised (35-43). Governing point: both stories pair a hopeless, humanly-unfixable
        condition (12 years of bleeding / a 12-year-old corpse) with Jesus's power reaching across the
        two major purity-law categories (chronic discharge / corpse contact, Lev 15 and Num 19) and two
        social extremes (an unnamed poor woman / a named synagogue ruler's daughter). Mark's own
        interruption technique makes the point: faith and access to Jesus aren't reserved for the
        socially prominent who can ask directly.
    content_word_studies:
      done: true
      notes: >
        Queried our own bible-text.db (macula-greek-sblgnt) directly for full word-by-word data and
        in-Mark concordances rather than relying on print lookups -- see terms below. Notable finding:
        concordancing haptomai/G680 across Mark (1:41, 3:10, 5:27-31 x4, 6:56, 7:33, 8:22, 10:13) shows
        every other occurrence is Jesus (or the sick brought to him) initiating touch to heal -- this
        passage is the sole case of someone touching Jesus first, covertly, precisely because Lev 15:27
        makes that contact one-directionally defiling. Second finding: sozo/G4982 concordanced across
        Mark spans the full range from purely physical (5:23,28,34; 6:56) to fully soteriological (8:35;
        10:26; 13:13,20; 16:16), with the identical formula "he pistis sou sesoken se" recurring verbatim
        at 10:52 (Bartimaeus) -- not incidental repetition, a deliberate authorial echo.
      terms:
        - {word: "ἅπτω", language: greek, transliteration: "haptō", strongs_id: "G680", gloss: "to touch, take hold of", range_of_meanings: ["touch/take hold of (Mark's healing-touch motif, always initiated by Jesus except here)"], notes: "LN domain 24.73 (physiological/sensory contact) at every Mark occurrence; theological weight comes from direction of contact reversing Lev 15:27's transmission logic, not from lexical range itself."}
        - {word: "σῴζω", language: greek, transliteration: "sōzō", strongs_id: "G4982", gloss: "to save, heal, deliver, make well", range_of_meanings: ["physical healing/restoration to health (LN domain 23.136, this occurrence)", "eschatological/soteriological salvation (elsewhere in Mark, e.g. 8:35, 10:26, 13:13, 16:16)"], notes: "LN classifies the Mark 5:34/5:28 occurrences under 23.136 (healing), same domain as iaomai/G2390 in 5:29 -- context favors physical sense primarily, but the verbatim reuse of the whole phrase at 10:52 and the word's own later soteriological occurrences in the same book make the double resonance a real authorial feature, not reader over-reading. Root fallacy guardrail: don't claim she 'received salvation' as the primary sense here -- that's importing 8:35's usage into 5:34's context."}
        - {word: "δύναμις", language: greek, transliteration: "dynamis", strongs_id: "G1411", gloss: "power, might, inherent power", notes: "LN domain 76.1, 'power, force.' Mark 5:30 -- Jesus perceives power has gone out from him, prior to and independent of his verbal address to her; the healing happened at her touch, not at his word, which is itself narratively significant (contrast most other Markan healings, which happen at Jesus's spoken word or touch)."}
        - {word: "θυγάτηρ", language: greek, transliteration: "thygatēr", strongs_id: "G2364", gloss: "daughter", notes: "Jesus's address (5:34) is the only time in the Gospels he calls a woman 'daughter' directly. Restorative/familial language answering her 12 years of likely social and cultic isolation -- LN domain 9 (kinship)."}

  hermeneutics:
    cultural_vs_transcultural:
      done: true
      notes: >
        Culturally bound: the specific Levitical purity mechanics (what exactly transmits uncleanness,
        for how long, the washing requirement) were part of Israel's Old Covenant ceremonial law and are
        not binding on believers under the New Covenant (consistent with AGENTS.md's ceremonial/moral/civil
        distinction). Transcultural: the underlying principle that faith reaching for Christ is not
        blocked by a person's social, physical, or ritual disqualification -- and that he does not
        contract defilement from the unclean, but transmits cleanness/wholeness to them -- is a
        pattern taught elsewhere (e.g. Jesus touching lepers, Mark 1:41; eating with sinners, Mark 2:15-17).
    theological_principle:
      done: true
      notes: >
        Faith that reaches for Christ, even hesitantly and from the margins, meets a power that reverses
        the expected direction of contamination: instead of being defiled by the unclean, Jesus makes the
        unclean whole. Cross-checked against the same pattern taught explicitly elsewhere (leper: Mark
        1:40-42; tax collectors/sinners: Mark 2:15-17; Zacchaeus: Luke 19) -- not built on this narrative
        detail alone.
    application_draft:
      done: true
      notes: "Kept separate from exegesis section in the draft per skill instructions."

  cross_reference:
    done: true
    cross_refs:
      - {ref: "Mark 1:40-42", relation: "Same touch-to-heal pattern with a leper -- another ritually unclean condition, Jesus touches rather than avoids"}
      - {ref: "Mark 10:46-52", relation: "Identical formula 'your faith has healed/saved you' (sesoken) at Bartimaeus's healing"}
      - {ref: "Leviticus 15:19-30", relation: "The purity law creating the woman's 12-year social/cultic exclusion"}
      - {ref: "Numbers 19:11-13", relation: "Corpse-contact uncleanness -- the parallel purity category in the Jairus's-daughter half of the sandwich"}
      - {ref: "Mark 2:15-17", relation: "Same theological point in a different register -- Jesus not defiled by contact with sinners, table fellowship"}
    translations_compared: ["ESV", "WEB", "ASV"]
    divergences_noted: >
      Mark 5:34 sesoken: ESV/WEB "made you well," ASV/KJV-tradition "made thee whole" -- "whole" arguably
      captures the sozo double-resonance (physically whole / spiritually complete) better than "made well,"
      worth flagging as a translation note rather than picking one as simply correct. Matthew's parallel
      (9:20-22) is roughly a third the length of Mark's (48 vs 153 Greek words, word-counted directly from
      macula-greek), dropping the physicians/expense detail entirely -- consistent with Matthew's usual
      compression of Markan miracle narratives toward the christological point.

  drafting:
    done: true
    file: docs/content/studies/prophecy-fulfilled-in-jesus/woman-issue-of-blood-faith-and-access.md
  review:
    done: false
    validated: false
    validation_notes: >
      npm run validate is broken post mkdocs/astro split -- app/scripts/validate-content.js hardcodes
      '../docs/content' relative to app/, which no longer resolves after the site split. Frontmatter
      checked manually instead (parses with pyyaml, title/category/tags/bible_references present,
      description 186 chars, draft:true). Flagged to user as a separate repo finding, not fixed here.

open_questions:
  - "Luke's account (8:43-48) omits or softens the 'no physician could help her' detail in some manuscript
     traditions (commonly attributed to Luke's own vocation as physician per Col 4:14) -- did not verify
     this against actual textual apparatus/manuscript evidence, mentioned only as a widely-noted
     possibility, not asserted as textually certain."
